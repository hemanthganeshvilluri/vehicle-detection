<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Counter</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            margin-top: 20px;
        }

        img {
            border: 3px solid #00ffcc;
            border-radius: 10px;
            width: 800px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            background: #00ffcc;
            color: black;
            border-radius: 5px;
        }

        input {
            margin-top: 10px;
        }

        #status {
            margin-top: 10px;
            color: yellow;
        }
    </style>
</head>

<body>

<h1>🚗 Vehicle Counting System</h1>

<div class="container">
    <input type="file" id="videoInput" />
    <br>
    <button onclick="uploadVideo()">Upload & Start</button>
    <p id="status"></p>
</div>

<h2>Live Output</h2>
<img id="stream" />

<script>
async function uploadVideo() {
    const fileInput = document.getElementById("videoInput");
    const file = fileInput.files[0];
    const status = document.getElementById("status");

    if (!file) {
        alert("Please select a video");
        return;
    }

    status.innerText = "Uploading...";

    const formData = new FormData();
    formData.append("file", file);

    try {
        await fetch("http://127.0.0.1:8000/upload", {
            method: "POST",
            body: formData
        });

        status.innerText = "Processing & Streaming...";

        // 🔥 THIS SHOWS YOUR VIDEO STREAM
        document.getElementById("stream").src =
            "http://127.0.0.1:8000/stream";

    } catch (error) {
        console.error(error);
        status.innerText = "Error occurred!";
    }
}
</script>

</body>
</html>
